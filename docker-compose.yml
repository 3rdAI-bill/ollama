# Ollama container — CPU-only by default.
# For GPU: docker compose -f docker-compose.yml -f docker-compose.gpu.yml up -d

services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

volumes:
  ollama_data: {}
